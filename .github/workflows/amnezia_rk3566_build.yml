name: Build AmneziaWG kernel module only
on:
  watch:
    types: started
  workflow_dispatch:
permissions:
  contents: write
    
jobs:
  prepare_release:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
    - name: Get release tag
      id: release_tag
      run: |
        release_tag="FriendlyWrt-$(date +%Y-%m-%d)"
        echo "##[set-output name=release_tag;]$release_tag"
    - name: Create empty release
      id: release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.release_tag.outputs.release_tag }}
        draft: false
        prerelease: false
    outputs:
      release_tag: ${{ steps.release_tag.outputs.release_tag }}
      upload_url: ${{ steps.release.outputs.upload_url }}

  build_amneziawg_module:
    needs: prepare_release
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    strategy:
      matrix:
        VERSION: ['23.05']
        ARCH: [aarch64_cortex-a53] # для rk3566

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d
        wget https://raw.githubusercontent.com/friendlyarm/build-env-on-ubuntu-bionic/master/install.sh
        sed -i -e 's/^apt-get -y install openjdk-8-jdk/# apt-get -y install openjdk-8-jdk/g' install.sh
        sed -i -e 's/^\[ -d fa-toolchain \]/# [ -d fa-toolchain ]/g' install.sh
        sed -i -e 's/^(cat fa-toolchain/# (cat fa-toolchain/g' install.sh
        sed -i -e 's/^(tar xf fa-toolchain/# (tar xf fa-toolchain/g' install.sh
        sudo -E bash ./install.sh
        sudo -E git config --global user.name 'GitHub Actions'
        sudo -E git config --global user.email 'noreply@github.com'
        git clone https://github.com/friendlyarm/repo
        sudo -E cp repo/repo /usr/bin/
        mkdir -p ./artifact
        sudo swapoff -a
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk /usr/local/share/boost /opt/ghc
        echo "cores: $(nproc)"

    - name: Download source
      run: |
        mkdir project
        cd project



        
        repo init --depth=1 -u https://github.com/friendlyarm/friendlywrt_manifests -b master-v${{ matrix.VERSION }} \
                -m rk3566.xml --repo-url=https://github.com/friendlyarm/repo  --no-clone-bundle               
        repo sync -c kernel --no-clone-bundle
        repo sync -c friendlywrt --no-clone-bundle
        repo sync -c configs --no-clone-bundle
        repo sync -c device/common --no-clone-bundle
        repo sync -c device/friendlyelec --no-clone-bundle
        repo sync -c scripts --no-clone-bundle
        repo sync -c scripts/sd-fuse  --no-clone-bundle
        repo sync -c toolchain  --no-clone-bundle
        
    - name: Prepare dot config and add AmneziaWG feed
      run: |
        cd project
        cat > .current_config.mk <<EOL
        . device/friendlyelec/rk3566/base.mk
        TARGET_IMAGE_DIRNAME=friendlywrt23.05
        TARGET_FRIENDLYWRT_CONFIG=rockchip
        EOL
        ./build.sh friendlywrt

    - name: Apply customizations
      run: |
        cd project
        source $GITHUB_WORKSPACE/scripts/add_packages.sh
        source $GITHUB_WORKSPACE/scripts/custom_config.sh
        echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
        make defconfig
        
        echo "CONFIG_LINUX_VERSION=\"6.1.141\"" >> .config
        echo "CONFIG_LINUX_VERMAGIC=\"aarch64\"" >> .config
        
    - name: Download package
      run: |
        cd project/friendlywrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: Prepare toolchain and kernel
      run: |
        cd project/friendlywrt
        make tools/install -j$(nproc) V=s
        make toolchain/install -j$(nproc) V=s
        make target/linux/compile -j$(nproc) V=s
                 
    - name: Compile only AmneziaWG kernel module
      id: compile_module
      run: |
        cd project/friendlywrt
        make package/feeds/amneziawg/kmod-amneziawg/compile -j$(nproc) V=s
        find bin -name "kmod-amneziawg*.ipk" || echo "No ipk found"
        
    - name: Package the compiled IPK(s)
      run: |
        cd project/friendlywrt
        mkdir -p ../../artifact
        find bin -name "*.ipk" -exec cp {} ../../artifact/ \;
        cd ../../artifact
        tar czf amneziawg-module-${{ matrix.VERSION }}-${{ matrix.ARCH }}.tar.gz *.ipk
        echo "ARTIFACT_NAME=amneziawg-module-${{ matrix.VERSION }}-${{ matrix.ARCH }}.tar.gz" >> $GITHUB_ENV
    
    - name: Upload module archive to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./artifact/${{ env.ARTIFACT_NAME }}
        asset_name: ${{ env.ARTIFACT_NAME }}
        tag: ${{ needs.prepare_release.outputs.release_tag }}
        overwrite: true
